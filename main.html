<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝牙扫描 PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #device-list { margin-top: 20px; text-align: left; max-width: 400px; margin-inline: auto; }
        .device-item { padding: 10px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>蓝牙设备扫描器</h1>
    <button id="scan-btn">开始扫描设备</button>
    <div id="device-list"></div>

    <script>
        const scanBtn = document.getElementById('scan-btn');
        const deviceList = document.getElementById('device-list');

        scanBtn.addEventListener('click', async () => {
            try {
                // 请求蓝牙设备，acceptAllDevices 表示显示所有发现的设备
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });

                // 在界面上显示连接的设备名
                const item = document.createElement('div');
                item.className = 'device-item';
                item.textContent = `发现设备: ${device.name || '未知设备'} (ID: ${device.id})`;
                deviceList.appendChild(item);

                console.log('用户选择了设备:', device.name);
            } catch (error) {
                console.error('蓝牙扫描失败:', error);
                alert('扫描取消或当前浏览器不支持 Web Bluetooth API');
            }
        });

        // 注册 Service Worker 使其成为 PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
